# API Reverse Proxy
# Pattern: app container uses service base URLs, proxy injects service keys.

server {
    listen 8080;

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # OpenAI API proxy
    # Requests to /openai/* are forwarded to ${OPENAI_UPSTREAM_BASE}/*
    location /openai/ {
        proxy_pass ${OPENAI_UPSTREAM_BASE}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;

        # Inject API key from environment variable
        proxy_set_header Authorization "Bearer ${OPENAI_API_KEY}";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;

        # Timeouts for long-running completions
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Allow large request bodies for embeddings
        client_max_body_size 10M;
    }

    # Semantic Scholar API proxy
    # Requests to /semantic-scholar/* are forwarded to ${SEMANTIC_SCHOLAR_UPSTREAM_BASE}/*
    location /semantic-scholar/ {
        proxy_pass ${SEMANTIC_SCHOLAR_UPSTREAM_BASE}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;

        # Inject API key from environment variable
        proxy_set_header x-api-key "${SEMANTIC_SCHOLAR_API_KEY}";
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }
}
