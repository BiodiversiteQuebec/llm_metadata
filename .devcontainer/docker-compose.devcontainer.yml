services:
  claude-dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        CLAUDE_CODE_VERSION: latest
    environment:
      GROBID_URL: http://grobid:8070
      QDRANT_URL: http://qdrant:6333
      ENABLE_FIREWALL: ${ENABLE_FIREWALL:-true}
    cap_add:
      - NET_ADMIN
    volumes:
      - ..:/workspace:cached
      - venv:/workspace/.venv
      - uv-cache:/home/dev/.cache/uv
      - command-history:/commandhistory
    ports:
      - "${JUPYTER_PORT:-8881}:${JUPYTER_PORT:-8881}"
      - "8000:8000"
      - "8080:8080"
      - "4200:4200"
    depends_on:
      - grobid
      - qdrant
    command: sleep infinity

  grobid:
    image: lfoppiano/grobid:0.8.0
    environment:
      - JAVA_OPTS=-Xmx4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/localhost/8070 && printf 'GET /api/isalive HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && IFS= read -r line <&3 && [[ \"$$line\" == *' 200 '* || \"$$line\" == *' 200' ]]" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/localhost/6333 && printf 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && IFS= read -r line <&3 && [[ \"$$line\" == *' 200 '* || \"$$line\" == *' 200' ]]" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  venv:
  uv-cache:
  command-history:
  qdrant-storage:
