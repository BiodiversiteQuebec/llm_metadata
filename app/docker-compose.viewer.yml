services:
  streamlit:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: llm-metadata-eval-viewer
    working_dir: /llm_metadata
    ports:
      - "8501:8501"
    volumes:
      - ../:/llm_metadata
    environment:
      - PYTHONPATH=/llm_metadata/src
      - PROMPT_EVAL_OUTPUT_DIR=${PROMPT_EVAL_OUTPUT_DIR:-artifacts/runs}
      - EVAL_VIEWER_RESULTS_DIR=${EVAL_VIEWER_RESULTS_DIR:-}
      - STREAMLIT_SERVER_BASE_URL_PATH=llm_extraction_results
    restart: unless-stopped
